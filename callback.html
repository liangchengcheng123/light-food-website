<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="微博开放平台 OAuth 授权回调页面。">
  <title>OAuth回调 | {{研究项目名称}}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="主导航">
      <a class="brand" href="index.html">{{研究项目名称}}</a>
      <button class="nav-toggle" type="button" aria-label="展开导航" aria-expanded="false">菜单</button>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="research.html">项目介绍</a>
        <a href="privacy.html">隐私与伦理</a>
        <a class="active" href="callback.html">OAuth回调</a>
        <a href="contact.html">联系</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-title">
      <div class="container">
        <p class="eyebrow">OAuth Redirect Page</p>
        <h1>授权回调页面</h1>
        <p class="lead">本页面仅用于接收微博开放平台 OAuth Redirect URI 返回的授权码。</p>
      </div>
    </section>

    <section class="section">
      <div class="container callback-panel">
        <h2>授权码检测结果</h2>
        <p id="status-text" class="status-text">正在检测 URL 参数...</p>
        <div class="code-box" aria-live="polite">
          <span class="label">code</span>
          <code id="code-value">未检测到授权码</code>
        </div>
        <button id="copy-button" class="button primary" type="button" disabled>复制授权码</button>

        <div class="notice">
          <h2>安全提示</h2>
          <p>请复制授权码 code，并在本地后端脚本中换取 access_token。</p>
          <p>本网页前端不会请求 App Secret，不会保存 access_token，也不会向第三方发送授权码。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© {{姓名}} | {{研究项目名称}}</p>
      <p>网站域名：{{网站域名}}</p>
    </div>
  </footer>

  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    navToggle.addEventListener('click', () => {
      const expanded = navToggle.getAttribute('aria-expanded') === 'true';
      navToggle.setAttribute('aria-expanded', String(!expanded));
      navLinks.classList.toggle('open');
    });

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const statusText = document.getElementById('status-text');
    const codeValue = document.getElementById('code-value');
    const copyButton = document.getElementById('copy-button');

    if (code) {
      statusText.textContent = '已检测到授权码。';
      codeValue.textContent = code;
      copyButton.disabled = false;
    } else {
      statusText.textContent = '未检测到授权码。请确认微博开放平台 Redirect URI 是否配置为当前 callback.html 地址。';
      codeValue.textContent = '未检测到授权码';
    }

    copyButton.addEventListener('click', async () => {
      if (!code) return;
      try {
        await navigator.clipboard.writeText(code);
        copyButton.textContent = '已复制';
      } catch (error) {
        copyButton.textContent = '请手动复制';
      }
    });
  </script>
</body>
</html>
